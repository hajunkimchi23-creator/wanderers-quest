<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .error-title {
            font-size: 32px;
            margin-bottom: 15px;
            color: #f39c12;
        }
        
        .error-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-button {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(243, 156, 18, 0.2);
            border: 2px solid #f39c12;
            color: #f39c12;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .error-button:hover {
            background: rgba(243, 156, 18, 0.3);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.6);
            transform: translateY(-2px);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-description">
            The page you're looking for seems to have disappeared into the darkness...
            It might be offline or the path was incorrect.
        </p>
        <a href="/wanderers-quest/" class="error-button">Return to Game</a>
    </div>
</body>
</html>
